kind = "web"
previewPath = "/"
title = "ACCAI — Autoridad, Confianza y Conversión AI"
version = "1.0.0"
id = "artifacts/accai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24185

[services.development]
run = "pnpm --filter @workspace/accai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/accai", "run", "build" ]
publicDir = "artifacts/accai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24185"
BASE_PATH = "/"
